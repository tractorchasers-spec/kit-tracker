<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Kit Tracker"/>
<meta name="theme-color" content="#2C1810"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>2ScaleFab Kit Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap');
:root{--soil:#2C1810;--field:#4A7C59;--field-light:#6FAE7F;--wheat:#D4A843;--wheat-light:#F0C96A;--cream:#FAF6EF;--paper:#F2EDE4;--ink:#1A1208;--muted:#7A6E62;--danger:#C0392B;--danger-bg:#FDECEA;--warn-bg:#FEF9EC;--success-bg:#EEF7F1;--border:rgba(44,24,16,0.12);--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);display:flex;flex-direction:column;}
.header{background:var(--soil);color:var(--cream);padding:calc(12px + var(--safe-top)) 16px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hbrand{font-family:'Instrument Serif',serif;font-size:20px;}
.hsub{font-family:'DM Mono',monospace;font-size:9px;color:var(--wheat);letter-spacing:.12em;text-transform:uppercase;margin-top:1px;}
.hsave{font-size:9px;color:var(--field-light);min-height:11px;}
.hright{font-family:'DM Mono',monospace;font-size:11px;color:var(--wheat-light);text-align:right;}
.toolbar{padding:10px 12px;background:var(--paper);border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;}
.sw{flex:1;min-width:150px;position:relative;}
.sw input{width:100%;padding:8px 10px 8px 30px;border:1px solid var(--border);border-radius:8px;background:var(--cream);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);outline:none;-webkit-appearance:none;}
.sw input:focus{border-color:var(--field);}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;}
.cats{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.cb{font-family:'DM Mono',monospace;font-size:10px;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--cream);color:var(--muted);cursor:pointer;white-space:nowrap;}
.cb.active{background:var(--soil);color:var(--wheat);border-color:var(--soil);}
.sumbar{display:flex;border-bottom:1px solid var(--border);background:var(--cream);flex-shrink:0;}
.sc{flex:1;padding:8px 4px;text-align:center;border-right:1px solid var(--border);}
.sc:last-child{border-right:none;}
.sn{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;line-height:1;}
.sl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.plist{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px;display:flex;flex-direction:column;gap:8px;padding-bottom:calc(80px + var(--safe-bottom));}
.pcard{background:white;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.ch{display:flex;align-items:center;padding:12px;cursor:pointer;gap:8px;user-select:none;}
.chev{font-size:9px;color:var(--muted);transition:transform .2s;margin-left:auto;flex-shrink:0;}
.chev.open{transform:rotate(90deg);}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cn{font-size:13px;font-weight:500;flex:1;line-height:1.3;}
.cbadge{font-family:'DM Mono',monospace;font-size:9px;padding:3px 8px;border-radius:20px;flex-shrink:0;}
.br{background:var(--success-bg);color:#2D7A45;}
.bm{background:var(--danger-bg);color:var(--danger);}
.bw{background:var(--warn-bg);color:#9A6E00;}
.be{background:var(--paper);color:var(--muted);}
.cbody{display:none;padding:0 12px 14px;}
.cbody.open{display:block;}
.pl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;padding-top:2px;}
.pr{display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid var(--border);font-size:13px;}
.pr input[type=checkbox]{width:18px;height:18px;accent-color:var(--field);cursor:pointer;flex-shrink:0;}
.pn{flex:1;line-height:1.3;}
.pn.done{text-decoration:line-through;color:var(--muted);}
.pq{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap;}
.pd{font-size:13px;color:var(--muted);cursor:pointer;padding:4px 6px;border-radius:4px;border:none;background:none;flex-shrink:0;}
.pd:active{background:var(--danger-bg);color:var(--danger);}
.ptrack{height:3px;background:var(--paper);border-radius:2px;margin-bottom:8px;overflow:hidden;}
.pfill{height:100%;background:var(--field);border-radius:2px;transition:width .3s;}
.af{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.af input[type=text]{flex:1;min-width:80px;padding:8px 10px;border:1px dashed var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;background:var(--cream);color:var(--ink);outline:none;-webkit-appearance:none;}
.af input[type=text]:focus{border-color:var(--field);border-style:solid;}
.af input[type=number]{width:54px;padding:8px 6px;border:1px dashed var(--border);border-radius:7px;font-family:'DM Mono',monospace;font-size:13px;background:var(--cream);color:var(--ink);outline:none;text-align:center;-webkit-appearance:none;}
.btna{padding:8px 14px;background:var(--field);color:white;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;flex-shrink:0;}
.btna:active{background:var(--soil);}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;line-height:1.8;}
.fab{position:fixed;bottom:calc(20px + var(--safe-bottom));right:16px;background:var(--wheat);color:var(--soil);border:none;border-radius:24px;padding:13px 20px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 3px 16px rgba(44,24,16,.25);z-index:200;}
.fab:active{transform:scale(0.97);}
.mo{display:none;position:fixed;inset:0;background:rgba(26,18,8,.55);z-index:300;align-items:flex-end;justify-content:center;}
.mo.open{display:flex;}
.modal{background:var(--cream);border-radius:20px 20px 0 0;padding:24px 20px calc(32px + var(--safe-bottom));width:100%;max-width:560px;}
.modal h2{font-family:'Instrument Serif',serif;font-size:22px;margin-bottom:16px;}
.modal label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:5px;margin-top:12px;}
.modal input,.modal select{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:8px;background:white;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);outline:none;-webkit-appearance:none;}
.modal input:focus,.modal select:focus{border-color:var(--field);}
.mbtns{display:flex;gap:10px;margin-top:20px;}
.bp{flex:1;padding:13px;background:var(--soil);color:var(--cream);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;cursor:pointer;}
.bs{padding:13px 18px;background:var(--paper);color:var(--muted);border:1px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;cursor:pointer;}
.df{background:#4A9C6F;}.dm{background:#8B5E3C;}.dh{background:#D4A843;}.dg{background:#C8963C;}.dt{background:#7A8C7A;}.ds{background:#3C6A8C;}.dsp{background:#8C3C6A;}.dtr{background:#4A5C8C;}.dmi{background:#9A7A5C;}.dp{background:#5C5C5C;}
</style>
</head>

    <div class="mbtns"><button class="bs" onclick="closeMo()">Cancel</button><button class="bp" onclick="addP()">Add product</button></div>
  </div>
</div>

var prods=[],openC={},activeCat='all',saveT=null;
function copyDef(){prods=DEF.map(function(p){return {id:p.id,n:p.n,c:p.c,parts:[]};});}
function tryLoad(){
  var ok=false;
  try{localStorage.setItem('_t_','1');localStorage.removeItem('_t_');ok=true;}catch(e){}
  if(ok){
    try{
      var raw=localStorage.getItem(SK);
      if(raw){
        var d=JSON.parse(raw);
        if(d&&d.prods&&d.prods.length){
          var sm={};
          for(var i=0;i<d.prods.length;i++){sm[d.prods[i].id]=d.prods[i];}
          prods=DEF.map(function(p){var s=sm[p.id];return {id:p.id,n:p.n,c:p.c,parts:s?s.parts||[]:[]};});
          for(var j=0;j<d.prods.length;j++){var sp=d.prods[j];if(!DEF.some(function(x){return x.id===sp.id;}))prods.push(sp);}
        }else{copyDef();}
        if(d&&d.openC)openC=d.openC;
      }else{copyDef();}
    }catch(e){copyDef();}
  }else{copyDef();}
  buildCats();render();
}
function save(){
  try{localStorage.setItem(SK,JSON.stringify({prods:prods,openC:openC}));var el=document.getElementById('hsave');if(el){el.textContent='Saved';setTimeout(function(){el.textContent='';},1500);}}catch(e){}
}
function ds(){clearTimeout(saveT);saveT=setTimeout(save,400);}
function uid(){return 'u'+Date.now()+Math.random().toString(36).slice(2,5);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function pst(p){if(!p.parts||!p.parts.length)return 'empty';var m=0;for(var i=0;i<p.parts.length;i++){if(!p.parts[i].have)m++;}return m===0?'ready':m===1?'warn':'missing';}
function buildCats(){
  var w=document.getElementById('cats');w.innerHTML='';
  var keys=['all'].concat(Object.keys(CATS));
  for(var i=0;i<keys.length;i++){(function(cat){var b=document.createElement('button');b.className='cb'+(activeCat===cat?' active':'');b.textContent=cat==='all'?'All':CATS[cat].l;b.onclick=function(){activeCat=cat;buildCats();render();};w.appendChild(b);})(keys[i]);}
}
function render(){
  var q=(document.getElementById('sq').value||'').toLowerCase();
  var vis=prods.filter(function(p){return (activeCat==='all'||p.c===activeCat)&&(!q||p.n.toLowerCase().indexOf(q)!==-1);});
  var r=vis.filter(function(p){return pst(p)==='ready';}).length;
  document.getElementById('st').textContent=vis.length;
  document.getElementById('sr').textContent=r;
  document.getElementById('sm').textContent=vis.filter(function(p){return pst(p)==='missing'||pst(p)==='warn';}).length;
  document.getElementById('sno').textContent=vis.filter(function(p){return pst(p)==='empty';}).length;
  document.getElementById('hright').textContent=r+'/'+vis.length+' ready';
  var list=document.getElementById('plist');
  if(!vis.length){list.innerHTML='<div class="empty">No products found.<br/>Try a different search or tap + to add one.</div>';return;}
  list.innerHTML='';
  for(var i=0;i<vis.length;i++){(function(prod){
    var s=pst(prod),pts=prod.parts||[],hv=pts.filter(function(x){return x.have;}).length,tot=pts.length,pct=tot?Math.round(hv/tot*100):0,isOpen=openC[prod.id],ci=CATS[prod.c]||CATS.misc;
    var bc=s==='ready'?'br':s==='warn'?'bw':s==='missing'?'bm':'be';
    var bt=s==='ready'?'Ready':s==='warn'?'1 missing':s==='missing'?(tot-hv)+' missing':'No kit';
    var ph='';
    for(var j=0;j<pts.length;j++){ph+='<div class="pr"><input type="checkbox"'+(pts[j].have?' checked':'')+' onchange="togP(\''+prod.id+'\','+j+',this.checked)"/><span class="pn'+(pts[j].have?' done':'')+'">'+esc(pts[j].name)+'</span><span class="pq">x'+pts[j].qty+'</span><button class="pd" onclick="delP(\''+prod.id+'\','+j+')">&#10005;</button></div>';}
    var card=document.createElement('div');card.className='pcard';
    card.innerHTML='<div class="ch" onclick="togC(\''+prod.id+'\')"><div class="cdot '+ci.d+'"></div><div class="cn">'+esc(prod.n)+'</div><span class="cbadge '+bc+'">'+bt+'</span><span class="chev'+(isOpen?' open':'')+'">&#9654;</span></div><div class="cbody'+(isOpen?' open':'')+'">'+( tot?'<div class="ptrack"><div class="pfill" style="width:'+pct+'%"></div></div>':''  )+'<div class="pl">Assembly parts</div>'+(ph||'<div style="font-size:13px;color:var(--muted);padding:6px 0 4px;">No parts yet - add below.</div>')+'<div class="af"><input type="text" placeholder="Part name..." id="pn-'+prod.id+'" onkeydown="if(event.key===\'Enter\')addPt(\''+prod.id+'\')" autocomplete="off" autocorrect="off" spellcheck="false"/><input type="number" placeholder="Qty" id="pq-'+prod.id+'" value="1" min="1"/><button class="btna" onclick="addPt(\''+prod.id+'\')">Add</button></div></div>';
    list.appendChild(card);
  })(vis[i]);}
}
function togC(id){openC[id]=!openC[id];ds();render();}
function togP(pid,i,ch){for(var k=0;k<prods.length;k++){if(prods[k].id===pid){prods[k].parts[i].have=ch;break;}}ds();render();}
function delP(pid,i){for(var k=0;k<prods.length;k++){if(prods[k].id===pid){prods[k].parts.splice(i,1);break;}}ds();render();}
function addPt(pid){var ne=document.getElementById('pn-'+pid),qe=document.getElementById('pq-'+pid),nm=ne?ne.value.trim():'',qty=parseInt(qe?qe.value:'1')||1;if(!nm)return;for(var k=0;k<prods.length;k++){if(prods[k].id===pid){prods[k].parts.push({name:nm,qty:qty,have:false});break;}}ds();render();var f=document.getElementById('pn-'+pid);if(f){f.value='';f.focus();}}

function closeMo(){document.getElementById('mo').classList.remove('open');document.getElementById('nn').value='';}
function addP(){var nm=document.getElementById('nn').value.trim(),cat=document.getElementById('nc').value;if(!nm){document.getElementById('nn').focus();return;}prods.unshift({id:uid(),n:nm,c:cat,parts:[]});ds();closeMo();activeCat='all';buildCats();render();}

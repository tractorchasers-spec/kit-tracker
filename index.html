<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Kit Tracker"/>
<meta name="theme-color" content="#2C1810"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>2ScaleFab Kit Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap');
  :root{
    --soil:#2C1810;--field:#4A7C59;--field-light:#6FAE7F;--wheat:#D4A843;
    --wheat-light:#F0C96A;--cream:#FAF6EF;--paper:#F2EDE4;--ink:#1A1208;
    --muted:#7A6E62;--danger:#C0392B;--danger-bg:#FDECEA;--warn-bg:#FEF9EC;
    --success-bg:#EEF7F1;--border:rgba(44,24,16,0.12);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);display:flex;flex-direction:column;}

  /* HEADER */
  .header{
    background:var(--soil);color:var(--cream);
    padding:calc(12px + var(--safe-top)) 16px 12px;
    display:flex;align-items:center;justify-content:space-between;
    flex-shrink:0;
  }
  .hbrand{font-family:'Instrument Serif',serif;font-size:20px;}
  .hsub{font-family:'DM Mono',monospace;font-size:9px;color:var(--wheat);letter-spacing:.12em;text-transform:uppercase;margin-top:1px;}
  .hsave{font-size:9px;color:var(--field-light);min-height:11px;transition:opacity .3s;}
  .hright{font-family:'DM Mono',monospace;font-size:11px;color:var(--wheat-light);text-align:right;}

  /* TOOLBAR */
  .toolbar{padding:10px 12px;background:var(--paper);border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;}
  .sw{flex:1;min-width:150px;position:relative;}
  .sw input{width:100%;padding:8px 10px 8px 30px;border:1px solid var(--border);border-radius:8px;background:var(--cream);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);outline:none;-webkit-appearance:none;}
  .sw input:focus{border-color:var(--field);}
  .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;}
  .cats{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
  .cb{font-family:'DM Mono',monospace;font-size:10px;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--cream);color:var(--muted);cursor:pointer;white-space:nowrap;-webkit-appearance:none;}
  .cb.active{background:var(--soil);color:var(--wheat);border-color:var(--soil);}

  /* SUMMARY */
  .sumbar{display:flex;border-bottom:1px solid var(--border);background:var(--cream);flex-shrink:0;}
  .sc{flex:1;padding:8px 4px;text-align:center;border-right:1px solid var(--border);}
  .sc:last-child{border-right:none;}
  .sn{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;line-height:1;}
  .sl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}

  /* SCROLLABLE PRODUCT LIST */
  .plist{
    flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:10px 12px;display:flex;flex-direction:column;gap:8px;
    padding-bottom:calc(80px + var(--safe-bottom));
  }

  /* PRODUCT CARDS */
  .pcard{background:white;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .ch{display:flex;align-items:center;padding:12px 12px;cursor:pointer;gap:8px;user-select:none;}
  .chev{font-size:9px;color:var(--muted);transition:transform .2s;margin-left:auto;flex-shrink:0;}
  .chev.open{transform:rotate(90deg);}
  .cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .cn{font-size:13px;font-weight:500;flex:1;line-height:1.3;}
  .cbadge{font-family:'DM Mono',monospace;font-size:9px;padding:3px 8px;border-radius:20px;flex-shrink:0;}
  .br{background:var(--success-bg);color:#2D7A45;}
  .bm{background:var(--danger-bg);color:var(--danger);}
  .bw{background:var(--warn-bg);color:#9A6E00;}
  .be{background:var(--paper);color:var(--muted);}
  .cbody{display:none;padding:0 12px 14px;}
  .cbody.open{display:block;}
  .pl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;padding-top:2px;}
  .pr{display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid var(--border);font-size:13px;}
  .pr input[type=checkbox]{width:18px;height:18px;accent-color:var(--field);cursor:pointer;flex-shrink:0;}
  .pn{flex:1;line-height:1.3;}
  .pn.done{text-decoration:line-through;color:var(--muted);}
  .pq{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap;}
  .pd{font-size:11px;color:var(--muted);cursor:pointer;padding:4px 6px;border-radius:4px;border:none;background:none;flex-shrink:0;}
  .pd:active{background:var(--danger-bg);color:var(--danger);}
  .ptrack{height:3px;background:var(--paper);border-radius:2px;margin-bottom:8px;overflow:hidden;}
  .pfill{height:100%;background:var(--field);border-radius:2px;transition:width .3s;}
  .af{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
  .af input[type=text]{flex:1;min-width:80px;padding:8px 10px;border:1px dashed var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;background:var(--cream);color:var(--ink);outline:none;-webkit-appearance:none;}
  .af input[type=text]:focus{border-color:var(--field);border-style:solid;}
  .af input[type=number]{width:54px;padding:8px 6px;border:1px dashed var(--border);border-radius:7px;font-family:'DM Mono',monospace;font-size:13px;background:var(--cream);color:var(--ink);outline:none;text-align:center;-webkit-appearance:none;}
  .btna{padding:8px 14px;background:var(--field);color:white;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;flex-shrink:0;}
  .btna:active{background:var(--soil);}
  .empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;line-height:1.8;}

  /* FAB */
  .fab{
    position:fixed;bottom:calc(20px + var(--safe-bottom));right:16px;
    background:var(--wheat);color:var(--soil);border:none;border-radius:24px;
    padding:13px 20px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;
    cursor:pointer;box-shadow:0 3px 16px rgba(44,24,16,.25);z-index:200;
  }
  .fab:active{transform:scale(0.97);}

  /* MODAL */
  .mo{display:none;position:fixed;inset:0;background:rgba(26,18,8,.55);z-index:300;align-items:flex-end;justify-content:center;}
  .mo.open{display:flex;}
  .modal{
    background:var(--cream);border-radius:20px 20px 0 0;
    padding:24px 20px calc(32px + var(--safe-bottom));
    width:100%;max-width:560px;
  }
  .modal h2{font-family:'Instrument Serif',serif;font-size:22px;margin-bottom:16px;}
  .modal label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:5px;margin-top:12px;}
  .modal input,.modal select{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:8px;background:white;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);outline:none;-webkit-appearance:none;}
  .modal input:focus,.modal select:focus{border-color:var(--field);}
  .mbtns{display:flex;gap:10px;margin-top:20px;}
  .bp{flex:1;padding:13px;background:var(--soil);color:var(--cream);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;cursor:pointer;}
  .bs{padding:13px 18px;background:var(--paper);color:var(--muted);border:1px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;cursor:pointer;}

  /* CATEGORY DOTS */
  .df{background:#4A9C6F;}.dm{background:#8B5E3C;}.dh{background:#D4A843;}
  .dg{background:#C8963C;}.dt{background:#7A8C7A;}.ds{background:#3C6A8C;}
  .dsp{background:#8C3C6A;}.dtr{background:#4A5C8C;}.dmi{background:#9A7A5C;}.dp{background:#5C5C5C;}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="hbrand">2ScaleFab</div>
    <div class="hsub">Kit Tracker</div>
    <div class="hsave" id="hsave"></div>
  </div>
  <div class="hright" id="hright">Loading...</div>
</div>

<div class="toolbar">
  <div class="sw">
    <span class="si">&#9906;</span>
    <input type="text" id="sq" placeholder="Search products..." oninput="render()" autocomplete="off" autocorrect="off" spellcheck="false"/>
  </div>
  <div class="cats" id="cats"></div>
</div>

<div class="sumbar">
  <div class="sc"><div class="sn" id="st">0</div><div class="sl">Products</div></div>
  <div class="sc"><div class="sn" style="color:#2D7A45" id="sr">0</div><div class="sl">Ready</div></div>
  <div class="sc"><div class="sn" style="color:#C0392B" id="sm">0</div><div class="sl">Missing</div></div>
  <div class="sc"><div class="sn" style="color:#9A6E00" id="sno">0</div><div class="sl">No kit</div></div>
</div>

<div class="plist" id="plist"></div>
<button class="fab" onclick="openMo()">+ Add Product</button>

<div class="mo" id="mo" onclick="if(event.target===this)closeMo()">
  <div class="modal">
    <h2>Add product</h2>
    <label>Product name</label>
    <input type="text" id="nn" placeholder="e.g. 1/64 Rock Picker"/>
    <label>Category</label>
    <select id="nc">
      <option value="fertilizer">Fertilizer</option>
      <option value="manure">Manure</option>
      <option value="hay">Hay &amp; Forage</option>
      <option value="grain">Grain</option>
      <option value="tillage">Tillage</option>
      <option value="semi">Semi Trailers</option>
      <option value="specialty">Specialty</option>
      <option value="trucks">Trucks</option>
      <option value="misc">Misc</option>
      <option value="parts">Parts</option>
    </select>
    <div class="mbtns">
      <button class="bs" onclick="closeMo()">Cancel</button>
      <button class="bp" onclick="addP()">Add product</button>
    </div>
  </div>
</div>

  {id:'tr15',n:'1/64 Chevy C60 Fertilizer Spreader Floater Truck White',c:'trucks'},
  {id:'tr16',n:'1/64 Chevy C60 Fertilizer Spreader Floater Truck Red',c:'trucks'},
  {id:'tr17',n:'1/64 Peterbilt 385 Truck with Fertilizer Tender Black',c:'trucks'},
  {id:'mi1',n:'1/64 5,000 Gallon Standing Liquid Tank',c:'misc'},
  {id:'mi2',n:'1/64 3,000 Gallon Standing Liquid Tank',c:'misc'},
  {id:'mi3',n:'1/64 3,000 Gallon Standing Liquid Tank White',c:'misc'},
  {id:'mi4',n:'1/64 5,000 Gallon Standing Liquid Tank White',c:'misc'},
  {id:'mi5',n:'1/64 3,250 Gallon Leg Tank',c:'misc'},
  {id:'mi6',n:'1/64 2,350 Gallon Leg Tank White',c:'misc'},
  {id:'mi7',n:'1/64 1,550 Gallon Standing Liquid Tank',c:'misc'},
  {id:'mi8',n:'1/64 1,550 Gallon Standing Liquid Tank White',c:'misc'},
  {id:'mi9',n:'1/64 10,000 Gallon Standing Liquid Tank',c:'misc'},
  {id:'mi10',n:'1/64 Super Reel Hose Reel Black',c:'misc'},
  {id:'mi11',n:'1/64 MF Off Road Fork Lift',c:'misc'},
  {id:'mi12',n:'1/64 Rock Picker',c:'misc'},
  {id:'mi13',n:'1/64 Milk Trailer Tri Axle',c:'misc'},
  {id:'mi14',n:'1/64 Air Compressor 60 Gallon Black',c:'misc'},
  {id:'mi15',n:'1/64 Air Compressor 60 Gallon Blue',c:'misc'},
].map(p=>({...p,parts:[]}));

let prods=[],openC={},activeCat='all',saveT=null;

function load(){
  try{
    const raw=localStorage.getItem(SK);
    if(raw){
      const d=JSON.parse(raw);
      if(d.prods&&d.prods.length){
        const sm={};
        d.prods.forEach(p=>{sm[p.id]=p;});
        prods=DEF.map(p=>sm[p.id]?{...p,...sm[p.id]}:p);
        d.prods.forEach(p=>{if(!DEF.find(x=>x.id===p.id))prods.push(p);});
      } else prods=DEF.map(p=>({...p}));
      if(d.openC)openC=d.openC;
    } else {
      prods=DEF.map(p=>({...p}));
    }
  } catch(e){ prods=DEF.map(p=>({...p})); }
  buildCats();
  render();
}

function save(){
  try{
    localStorage.setItem(SK,JSON.stringify({prods,openC}));
    const el=document.getElementById('hsave');
    if(el){ el.textContent='Saved'; setTimeout(()=>el.textContent='',1500); }
  } catch(e){}
}
function ds(){ clearTimeout(saveT); saveT=setTimeout(save,400); }
function uid(){ return 'u'+Date.now()+Math.random().toString(36).slice(2,5); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function pst(p){
  if(!p.parts||!p.parts.length) return 'empty';
  const m=p.parts.filter(x=>!x.have).length;
  return m===0?'ready':m===1?'warn':'missing';
}

function buildCats(){
  const w=document.getElementById('cats');
  w.innerHTML='';
  ['all',...Object.keys(CATS)].forEach(cat=>{
    const b=document.createElement('button');
    b.className='cb'+(activeCat===cat?' active':'');
    b.textContent=cat==='all'?'All':CATS[cat].l;
    b.onclick=()=>{ activeCat=cat; buildCats(); render(); };
    w.appendChild(b);
  });
}

function render(){
  const q=(document.getElementById('sq').value||'').toLowerCase();
  const vis=prods.filter(p=>(activeCat==='all'||p.c===activeCat)&&(!q||p.n.toLowerCase().includes(q)));
  const r=vis.filter(p=>pst(p)==='ready').length;
  document.getElementById('st').textContent=vis.length;
  document.getElementById('sr').textContent=r;
  document.getElementById('sm').textContent=vis.filter(p=>['missing','warn'].includes(pst(p))).length;
  document.getElementById('sno').textContent=vis.filter(p=>pst(p)==='empty').length;
  document.getElementById('hright').textContent=r+'/'+vis.length+' ready';

  const list=document.getElementById('plist');
  if(!vis.length){
    list.innerHTML='<div class="empty">No products found.<br/>Try a different search<br/>or tap + to add one.</div>';
    return;
  }
  list.innerHTML='';
  vis.forEach(prod=>{
    const s=pst(prod),pts=prod.parts||[];
    const hv=pts.filter(x=>x.have).length,tot=pts.length;
    const pct=tot?Math.round(hv/tot*100):0;
    const isOpen=openC[prod.id];
    const ci=CATS[prod.c]||CATS.misc;
    const bc=s==='ready'?'br':s==='warn'?'bw':s==='missing'?'bm':'be';
    const bt=s==='ready'?'Ready':s==='warn'?'1 missing':s==='missing'?(tot-hv)+' missing':'No kit';
    const ph=pts.map((pt,i)=>`
      <div class="pr">
        <input type="checkbox" ${pt.have?'checked':''} onchange="togP('${prod.id}',${i},this.checked)"/>
        <span class="pn${pt.have?' done':''}">${esc(pt.name)}</span>
        <span class="pq">x${pt.qty}</span>
        <button class="pd" onclick="delP('${prod.id}',${i})">✕</button>
      </div>`).join('');

    const card=document.createElement('div');
    card.className='pcard';
    card.innerHTML=`
      <div class="ch" onclick="togC('${prod.id}')">
        <div class="cdot ${ci.d}"></div>
        <div class="cn">${esc(prod.n)}</div>
        <span class="cbadge ${bc}">${bt}</span>
        <span class="chev${isOpen?' open':''}">&#9654;</span>
      </div>
      <div class="cbody${isOpen?' open':''}">
        ${tot?`<div class="ptrack"><div class="pfill" style="width:${pct}%"></div></div>`:''}
        <div class="pl">Assembly parts</div>
        ${ph||'<div style="font-size:13px;color:var(--muted);padding:6px 0 4px;">No parts yet — add below.</div>'}
        <div class="af">
          <input type="text" placeholder="Part name..." id="pn-${prod.id}"
            onkeydown="if(event.key==='Enter')addPt('${prod.id}')"
            autocomplete="off" autocorrect="off" spellcheck="false"/>
          <input type="number" placeholder="Qty" id="pq-${prod.id}" value="1" min="1"/>
          <button class="btna" onclick="addPt('${prod.id}')">Add</button>
        </div>
      </div>`;
    list.appendChild(card);
  });
}

function togC(id){ openC[id]=!openC[id]; ds(); render(); }
function togP(pid,i,ch){ const p=prods.find(x=>x.id===pid); if(p){ p.parts[i].have=ch; ds(); render(); } }
function delP(pid,i){ const p=prods.find(x=>x.id===pid); if(p){ p.parts.splice(i,1); ds(); render(); } }

function addPt(pid){
  const ne=document.getElementById('pn-'+pid);
  const qe=document.getElementById('pq-'+pid);
  const nm=ne?ne.value.trim():'';
  const qty=parseInt(qe?.value)||1;
  if(!nm) return;
  const p=prods.find(x=>x.id===pid);
  if(p){ p.parts.push({name:nm,qty,have:false}); ds(); render(); }
  const f=document.getElementById('pn-'+pid);
  if(f){ f.value=''; f.focus(); }
}

function openMo(){ document.getElementById('mo').classList.add('open'); setTimeout(()=>document.getElementById('nn').focus(),100); }
function closeMo(){ document.getElementById('mo').classList.remove('open'); document.getElementById('nn').value=''; }

function addP(){
  const nm=document.getElementById('nn').value.trim();
  const cat=document.getElementById('nc').value;
  if(!nm){ document.getElementById('nn').focus(); return; }
  prods.unshift({id:uid(),n:nm,c:cat,parts:[]});
  ds(); closeMo(); activeCat='all'; buildCats(); render();
}

// Register service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

load();
</script>
</body>
</html>
